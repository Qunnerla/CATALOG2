<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Catalog</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: sans-serif; background-color: #f5f5f5; }

        /* NAVBAR */
        .navbar {
            position: sticky; top: 0; background: #fff;
            z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .navbar-top {
            display: flex; align-items: center; gap: 8px; padding: 10px 15px;
        }
        .cat-dropdown { position: relative; flex-shrink: 0; z-index: 200; }
        .cat-btn {
            display: flex; align-items: center; gap: 6px; padding: 9px 14px;
            background: #fff; border: 1.5px solid #ddd; border-radius: 20px;
            cursor: pointer; font-size: 14px; white-space: nowrap;
        }
        .cat-btn:hover { background: #f0f0f0; }
        .cat-menu {
            display: none; position: absolute; top: calc(100% + 6px); left: 0;
            background: #fff; border: 1px solid #ddd; border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.18); min-width: 160px;
            z-index: 9999;
        }
        .cat-menu.open { display: block; }
        .cat-menu a {
            display: block; padding: 10px 16px; text-decoration: none;
            color: #333; font-size: 14px; border-bottom: 1px solid #f0f0f0;
        }
        .cat-menu a:last-child { border-bottom: none; }
        .cat-menu a:hover { background: #f5f5f5; }
        .search-input {
            flex: 1; padding: 9px 16px; border: 1.5px solid #ddd;
            border-radius: 20px; font-size: 14px; outline: none; min-width: 0;
        }
        .search-input:focus { border-color: #888; }
        .cart-btn {
            position: relative; flex-shrink: 0; background: none; border: none;
            cursor: pointer; font-size: 24px; padding: 4px 8px; line-height: 1;
        }
        .cart-badge {
            position: absolute; top: 0; right: 0; background: #e53935; color: #fff;
            font-size: 10px; font-weight: bold; border-radius: 50%;
            width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
        }
        .logo-wrap { cursor: pointer; flex-shrink: 0; display: flex; align-items: center; user-select: none; }
        .shop-logo { height: 38px; width: auto; max-width: 110px; object-fit: contain; border-radius: 8px; display: block; }
        .logo-fallback { width: 38px; height: 38px; background: #f0f0f0; border-radius: 8px; display: none; align-items: center; justify-content: center; font-size: 22px; }

        /* SECTIONS */
        .section { padding: 20px 15px; }
        .section-title {
            font-size: 18px; font-weight: bold; margin-bottom: 15px;
            padding-bottom: 8px; border-bottom: 2px solid #eee;
        }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 600px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 14px; } }
        @media (min-width: 1024px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); gap: 18px; }
            .section { padding: 30px 60px; }
        }

        /* PRODUCT CARD */
        .card {
            background: #fff; border-radius: 16px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column;
        }
        .card-img { width: 100%; height: 140px; object-fit: cover; display: block; }
        .card-img-placeholder {
            width: 100%; height: 140px; background: #f0f0f0;
            display: flex; align-items: center; justify-content: center; font-size: 36px;
        }
        .card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .card-name { font-size: 14px; font-weight: bold; line-height: 1.3; }
        .card-detail { font-size: 12px; color: #666; line-height: 1.4; }
        .card-stock { display: flex; align-items: center; gap: 5px; font-size: 12px; }
        .stock-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
        .stock-dot.out { background: #bbb; }
        .stock-label { color: #4caf50; font-weight: bold; }
        .stock-label.out { color: #aaa; }
        .card-price { font-size: 16px; font-weight: bold; color: #c62828; }
        .size-label { font-size: 12px; color: #555; margin-bottom: 3px; }
        .size-options { display: flex; gap: 5px; flex-wrap: wrap; }
        .size-btn {
            padding: 4px 10px; border: 1.5px solid #ddd; border-radius: 20px;
            font-size: 12px; cursor: pointer; background: #fff; transition: all 0.15s;
        }
        .size-btn.selected { border-color: var(--theme-color,#333); background: var(--theme-color,#333); color: #fff; }
        .qty-row { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
        .qty-label { font-size: 12px; color: #555; }
        .qty-ctrl { display: flex; align-items: center; border: 1.5px solid #ddd; border-radius: 20px; overflow: hidden; }
        .qty-btn {
            width: 28px; height: 28px; background: none; border: none; cursor: pointer;
            font-size: 16px; font-weight: bold; color: #333;
            display: flex; align-items: center; justify-content: center;
        }
        .qty-btn:hover { background: #f0f0f0; }
        .qty-display { min-width: 28px; text-align: center; font-size: 14px; font-weight: bold; padding: 0 4px; }
        .card-actions { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
        .btn-order {
            padding: 9px; background: var(--theme-color,#333); color: #fff; border: none;
            border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: bold; width: 100%;
        }
        .btn-order:hover { opacity: 0.85; }
        .btn-order:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-cart {
            padding: 8px; background: #fff; color: #333; border: 1.5px solid #ddd;
            border-radius: 10px; cursor: pointer; font-size: 13px; width: 100%;
        }
        .btn-cart:hover { background: #f5f5f5; }
        .btn-cart:disabled { opacity: 0.35; cursor: not-allowed; }

        /* CART MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9000; }
        .modal-overlay.open { display: flex; align-items: flex-end; }
        .cart-drawer {
            background: #fff; width: 100%; max-height: 82vh;
            border-radius: 20px 20px 0 0; padding: 20px;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .drawer-header h3 { font-size: 18px; }
        .drawer-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #777; line-height: 1; padding: 4px; }
        .cart-customer-id { font-size: 11px; color: #bbb; margin-bottom: 10px; }
        .cart-items { flex: 1; overflow-y: auto; }
        .cart-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .cart-item-info { flex: 1; min-width: 0; }
        .cart-item-name { font-size: 14px; font-weight: bold; }
        .cart-item-sub { font-size: 12px; color: #888; margin-top: 2px; }
        .cart-item-price { font-size: 14px; font-weight: bold; color: #c62828; white-space: nowrap; }
        .cart-item-remove { background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; padding: 4px; line-height: 1; }
        .cart-item-remove:hover { color: #e53935; }
        .cart-empty { text-align: center; color: #bbb; padding: 40px 0; font-size: 15px; }
        .cart-footer { padding-top: 14px; border-top: 1px solid #eee; margin-top: 8px; }
        .cart-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; margin-bottom: 12px; }
        .btn-checkout { width: 100%; padding: 13px; background: #4caf50; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-checkout:hover { background: #388e3c; }

        /* ADMIN AUTH */
        .auth-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9000; }
        .auth-modal.open { display: flex; align-items: flex-end; }
        .auth-drawer { background: #fff; width: 100%; border-radius: 20px 20px 0 0; padding: 24px; display: flex; flex-direction: column; gap: 12px; }

        /* ADMIN PANEL */
        .admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9500; overflow-y: auto; }
        .admin-modal.open { display: block; }
        .admin-panel { background: #fff; width: calc(100% - 30px); max-width: 620px; margin: 20px auto 40px; border-radius: 16px; padding: 24px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .admin-header h3 { font-size: 18px; }
        .admin-section { margin-bottom: 22px; }
        .admin-section-title { font-size: 13px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .admin-input { padding: 8px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; width: 100%; }
        .admin-input:focus { border-color: #888; }
        .color-swatches { display: flex; gap: 10px; flex-wrap: wrap; }
        .color-swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.15s; }
        .color-swatch.active { border-color: #333; transform: scale(1.15); }

        /* ADMIN CATEGORY BLOCKS */
        .admin-cat-block { border: 1.5px solid #e0e0e0; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
        .admin-cat-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 13px 16px; background: #f5f5f5; cursor: pointer;
            font-size: 15px; font-weight: bold; user-select: none;
        }
        .admin-cat-header:hover { background: #eeeeee; }
        .admin-cat-arrow { transition: transform 0.2s; font-size: 11px; color: #999; }
        .admin-cat-arrow.open { transform: rotate(180deg); }
        .admin-cat-body { padding: 12px; display: none; }
        .admin-cat-body.open { display: block; }

        /* ADMIN PRODUCT CARD */
        .admin-prod-card { background: #fafafa; border: 1px solid #e8e8e8; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
        .admin-prod-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px; }
        .admin-prod-name-input {
            font-size: 15px; font-weight: bold; flex: 1;
            padding: 7px 11px; border: 1.5px solid #ddd; border-radius: 8px; outline: none;
        }
        .admin-prod-name-input:focus { border-color: #888; }
        .admin-field-row { margin-bottom: 10px; }
        .admin-field-label { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; display: block; }

        /* IMAGE */
        .admin-img-section { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
        .admin-img-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; flex-shrink: 0; }
        .admin-img-placeholder { width: 80px; height: 80px; border-radius: 8px; border: 1px solid #ddd; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
        .admin-img-controls { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 140px; }
        .admin-upload-label {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 9px 12px; background: #e3f2fd; border: 1.5px solid #90caf9;
            border-radius: 8px; font-size: 13px; cursor: pointer; color: #1565c0; font-weight: bold;
        }
        .admin-upload-label:hover { background: #bbdefb; }
        .admin-upload-label input[type="file"] { display: none; }

        /* SIZES */
        .admin-sizes-head { display: grid; grid-template-columns: 1fr 1fr 34px; gap: 6px; margin-bottom: 4px; }
        .admin-sizes-head span { font-size: 11px; font-weight: bold; color: #999; text-transform: uppercase; padding: 0 2px; }
        .admin-size-row { display: grid; grid-template-columns: 1fr 1fr 34px; gap: 6px; margin-bottom: 6px; align-items: center; }
        .admin-size-input { padding: 7px 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; width: 100%; }
        .admin-size-input:focus { border-color: #888; }
        .admin-size-del { width: 34px; height: 34px; background: #fce4ec; color: #c62828; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .admin-size-del:hover { background: #ef9a9a; }
        .admin-add-size-btn { padding: 6px 14px; background: #fff; border: 1.5px dashed #bbb; border-radius: 8px; cursor: pointer; font-size: 12px; color: #888; margin-top: 2px; }
        .admin-add-size-btn:hover { background: #f5f5f5; color: #444; }

        /* PRODUCT BOTTOM */
        .admin-prod-bottom { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .admin-stock-btn { flex: 1; padding: 9px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; min-width: 100px; }
        .admin-stock-btn.instock { background: #e8f5e9; color: #2e7d32; }
        .admin-stock-btn.outstock { background: #fce4ec; color: #c62828; }
        .admin-delete-btn { padding: 9px 14px; background: #fce4ec; color: #c62828; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .admin-delete-btn:hover { background: #ef9a9a; }

        /* ADD PRODUCT BTN */
        .admin-add-prod-btn { width: 100%; padding: 12px; background: #fff; border: 2px dashed #ddd; border-radius: 10px; cursor: pointer; font-size: 14px; color: #888; margin-top: 4px; }
        .admin-add-prod-btn:hover { background: #f5f5f5; color: #333; border-color: #aaa; }

        /* FOOTER */
        .footer-spacer { height: 40px; }

        /* TOAST */
        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 10px 22px;
            border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s;
            z-index: 99999; pointer-events: none; white-space: nowrap;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="navbar-top">
        <div class="logo-wrap" onclick="logoTap()" title="โลโก้ร้านค้า">
            <img id="shopLogo" src="LOGO.PNG" alt="โลโก้" class="shop-logo"
                 onerror="this.style.display='none';document.getElementById('logoFallback').style.display='flex'">
            <div id="logoFallback" class="logo-fallback">🏪</div>
        </div>
        <div class="cat-dropdown">
            <button class="cat-btn" id="catBtn" onclick="toggleCatMenu()">หมวดหมู่ ▾</button>
            <div class="cat-menu" id="catMenu"></div>
        </div>
        <input type="text" class="search-input" placeholder="ค้นหาสินค้า..." oninput="searchProducts(this.value)">
        <button class="cart-btn" onclick="openCart()" title="ตะกร้าสินค้า">
            🛒<span class="cart-badge" id="cartBadge">0</span>
        </button>
    </div>
</nav>

<!-- CATALOG -->
<div id="catalogContent"></div>

<!-- FOOTER -->
<div class="footer-spacer"></div>

<!-- CART MODAL -->
<div class="modal-overlay" id="cartModal" onclick="overlayClose(event,'cartModal',closeCart)">
    <div class="cart-drawer">
        <div class="drawer-header">
            <h3>ตะกร้าสินค้า</h3>
            <button class="drawer-close" onclick="closeCart()">✕</button>
        </div>
        <div class="cart-customer-id" id="custIdDisplay"></div>
        <div class="cart-items" id="cartItemsEl"></div>
        <div class="cart-footer">
            <div class="cart-total"><span>รวมทั้งหมด</span><span id="cartTotalEl">฿0</span></div>
            <button class="btn-checkout" onclick="checkout()">ยืนยันการสั่งซื้อ</button>
        </div>
    </div>
</div>

<!-- ADMIN AUTH -->
<div class="auth-modal" id="adminAuthModal" onclick="overlayClose(event,'adminAuthModal',closeAdminAuth)">
    <div class="auth-drawer">
        <div class="drawer-header">
            <h3>เข้าสู่ระบบแอดมิน</h3>
            <button class="drawer-close" onclick="closeAdminAuth()">✕</button>
        </div>
        <input type="password" class="admin-input" id="adminPwInput" placeholder="รหัสผ่าน"
               onkeydown="if(event.key==='Enter')verifyAdmin()">
        <button class="btn-order" style="margin-top:4px;" onclick="verifyAdmin()">เข้าสู่ระบบ</button>
    </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-modal" id="adminModal" onclick="overlayClose(event,'adminModal',closeAdmin)">
    <div class="admin-panel">
        <div class="admin-header">
            <h3>⚙ หลังบ้าน</h3>
            <button class="drawer-close" onclick="closeAdmin()">✕</button>
        </div>

        <div class="admin-section">
            <div class="admin-section-title">โลโก้ร้านค้า</div>
            <div class="admin-img-section">
                <img id="logoPreviewAdmin" src="LOGO.PNG" style="width:60px;height:60px;object-fit:contain;border-radius:8px;border:1px solid #ddd;flex-shrink:0;"
                     onerror="this.style.display='none';document.getElementById('logoNoAdmin').style.display='flex'">
                <div id="logoNoAdmin" style="display:none;width:60px;height:60px;background:#f0f0f0;border-radius:8px;border:1px solid #ddd;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;">🏪</div>
                <div class="admin-img-controls">
                    <label class="admin-upload-label">📷 เปลี่ยนโลโก้<input type="file" accept="image/*" onchange="handleLogoUpload(this)"></label>
                    <div style="font-size:11px;color:#aaa;margin-top:2px;">ไฟล์ชื่อ LOGO.PNG ในโฟลเดอร์เดียวกัน หรืออัปโหลดใหม่</div>
                </div>
            </div>
        </div>

        <div class="admin-section">
            <div class="admin-section-title">สีธีม</div>
            <div class="color-swatches" id="colorSwatches"></div>
        </div>

        <div class="admin-section">
            <div class="admin-section-title">จัดการสินค้า</div>
            <div id="adminCategoryList"></div>
        </div>

        <button onclick="saveAdmin()" style="width:100%;padding:13px;background:#333;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;margin-top:4px;">
            บันทึกทั้งหมด
        </button>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
var ADMIN_PASSWORD = '1234';

var categories = [
    { id: 'cat1', name: 'หมวดที่ 1' },
    { id: 'cat2', name: 'หมวดที่ 2' },
    { id: 'cat3', name: 'หมวดที่ 3' },
    { id: 'cat4', name: 'หมวดที่ 4' },
    { id: 'cat5', name: 'หมวดที่ 5' },
];

var products = [
    {
        id: 'p1', catId: 'cat1', name: 'สินค้า A', detail: 'รายละเอียดสินค้า A',
        sizes: [{ label: '10kg', price: 100 }, { label: '20kg', price: 190 }, { label: '30kg', price: 270 }],
        inStock: true, image: 'https://i.postimg.cc/cHkYGm6D/1.avif'
    },
    {
        id: 'p2', catId: 'cat1', name: 'สินค้า B', detail: 'รายละเอียดสินค้า B',
        sizes: [{ label: '10kg', price: 150 }, { label: '20kg', price: 280 }, { label: '30kg', price: 400 }],
        inStock: true, image: 'https://i.postimg.cc/cHkYGm6D/1.avif'
    },
    {
        id: 'p3', catId: 'cat2', name: 'สินค้า C', detail: 'รายละเอียดสินค้า C',
        sizes: [{ label: '10kg', price: 120 }, { label: '20kg', price: 220 }, { label: '30kg', price: 310 }],
        inStock: false, image: 'https://i.postimg.cc/R0K4BVhr/2.jpg'
    },
    {
        id: 'p4', catId: 'cat2', name: 'สินค้า D', detail: 'รายละเอียดสินค้า D',
        sizes: [{ label: '10kg', price: 200 }, { label: '20kg', price: 380 }, { label: '30kg', price: 550 }],
        inStock: true, image: 'https://i.postimg.cc/R0K4BVhr/2.jpg'
    },
    {
        id: 'p5', catId: 'cat3', name: 'สินค้า E', detail: 'รายละเอียดสินค้า E',
        sizes: [{ label: '10kg', price: 80 }, { label: '20kg', price: 150 }, { label: '30kg', price: 210 }],
        inStock: true, image: 'https://i.postimg.cc/cHkYGm6D/1.avif'
    },
];

var themeColors = ['#333333','#1565C0','#B71C1C','#2E7D32','#6A1B9A','#E65100'];
var cart = [];
var selectedSizes = {};
var quantities = {};
var currentTheme = themeColors[0];
var customerId = 'CUS-' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2,4).toUpperCase();

/* ===== INIT ===== */
function init() {
    applyTheme(currentTheme);
    renderNav();
    renderCatalog();
    document.getElementById('custIdDisplay').textContent = 'รหัสลูกค้า: ' + customerId;
    updateCartBadge();
}

function applyTheme(color) {
    currentTheme = color;
    document.documentElement.style.setProperty('--theme-color', color);
    document.querySelectorAll('.btn-order').forEach(function(b) { b.style.background = color; });
}

/* ===== LOGO TAP (กดโลโก้ 5 ครั้งเพื่อเข้าแอดมิน) ===== */
var _logoTaps = 0, _logoTimer = null;
function logoTap() {
    _logoTaps++;
    clearTimeout(_logoTimer);
    if (_logoTaps >= 5) {
        _logoTaps = 0;
        openAdminAuth();
        return;
    }
    _logoTimer = setTimeout(function() { _logoTaps = 0; }, 2000);
}

function handleLogoUpload(input) {
    var file = input.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        var src = e.target.result;
        var logo = document.getElementById('shopLogo');
        var logoFb = document.getElementById('logoFallback');
        var logoPrev = document.getElementById('logoPreviewAdmin');
        var logoNo = document.getElementById('logoNoAdmin');
        if (logo) { logo.src = src; logo.style.display = ''; }
        if (logoFb) logoFb.style.display = 'none';
        if (logoPrev) { logoPrev.src = src; logoPrev.style.display = ''; }
        if (logoNo) logoNo.style.display = 'none';
        showToast('เปลี่ยนโลโก้สำเร็จ ✓');
    };
    reader.readAsDataURL(file);
}

/* ===== NAV ===== */
function renderNav() {
    var menu = document.getElementById('catMenu');
    var active = categories.filter(function(c) { return products.some(function(p) { return p.catId === c.id; }); });
    menu.innerHTML = active.map(function(c) {
        return '<a href="#' + c.id + '" onclick="closeCatMenu()">' + c.name + '</a>';
    }).join('');
}

function toggleCatMenu() { document.getElementById('catMenu').classList.toggle('open'); }
function closeCatMenu() { document.getElementById('catMenu').classList.remove('open'); }
document.addEventListener('click', function(e) {
    if (!document.getElementById('catBtn').contains(e.target)) closeCatMenu();
});

/* ===== CATALOG ===== */
function renderCatalog() {
    var container = document.getElementById('catalogContent');
    container.innerHTML = '';
    categories.forEach(function(cat) {
        var prods = products.filter(function(p) { return p.catId === cat.id; });
        if (!prods.length) return;
        var sec = document.createElement('section');
        sec.className = 'section';
        sec.id = cat.id;
        sec.innerHTML = '<h2 class="section-title">' + cat.name + '</h2><div class="product-grid" id="grid-' + cat.id + '"></div>';
        container.appendChild(sec);
        var grid = document.getElementById('grid-' + cat.id);
        prods.forEach(function(p) { grid.appendChild(buildCard(p)); });
    });
}

function buildCard(p) {
    var card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = p.id;
    var defLabel = selectedSizes[p.id] || (p.sizes[0] ? p.sizes[0].label : '');
    var defPrice = 0;
    if (p.sizes[0]) {
        var found = p.sizes.find(function(s) { return s.label === defLabel; });
        defPrice = found ? found.price : p.sizes[0].price;
    }
    var stockHtml = p.inStock
        ? '<div class="card-stock"><span class="stock-dot"></span><span class="stock-label">มีสินค้า</span></div>'
        : '<div class="card-stock"><span class="stock-dot out"></span><span class="stock-label out">สินค้าหมด</span></div>';
    var sizeHtml = p.sizes.map(function(s) {
        return '<button class="size-btn' + (s.label === defLabel ? ' selected' : '') + '" onclick="selectSize(this,\'' + p.id + '\',\'' + s.label + '\')">' + s.label + '</button>';
    }).join('');
    var disAttr = p.inStock ? '' : ' disabled';
    var imgHtml = p.image
        ? '<img class="card-img" src="' + p.image + '" alt="' + p.name + '" loading="lazy">'
        : '<div class="card-img-placeholder">📦</div>';
    card.innerHTML = imgHtml +
        '<div class="card-body">' +
            '<div class="card-name">' + p.name + '</div>' +
            (p.detail ? '<div class="card-detail">' + p.detail + '</div>' : '') +
            stockHtml +
            '<div class="card-price" id="price-' + p.id + '">฿' + defPrice.toLocaleString() + '</div>' +
            (p.sizes.length ? '<div><div class="size-label">ขนาด</div><div class="size-options">' + sizeHtml + '</div></div>' : '') +
            '<div class="qty-row"><span class="qty-label">จำนวน</span><div class="qty-ctrl">' +
                '<button class="qty-btn" onclick="changeQty(\'' + p.id + '\',-1)">−</button>' +
                '<span class="qty-display" id="qty-' + p.id + '">' + (quantities[p.id] || 1) + '</span>' +
                '<button class="qty-btn" onclick="changeQty(\'' + p.id + '\',1)">+</button>' +
            '</div></div>' +
            '<div class="card-actions">' +
                '<button class="btn-order"' + disAttr + ' style="background:' + currentTheme + '" onclick="orderNow(\'' + p.id + '\')">สั่งซื้อ</button>' +
                '<button class="btn-cart"' + disAttr + ' onclick="addToCart(\'' + p.id + '\')">+ เพิ่มลงในตะกร้า</button>' +
            '</div>' +
        '</div>';
    return card;
}

function selectSize(btn, pid, label) {
    btn.closest('.card').querySelectorAll('.size-btn').forEach(function(b) { b.classList.remove('selected'); });
    btn.classList.add('selected');
    selectedSizes[pid] = label;
    var p = products.find(function(x) { return x.id === pid; });
    var s = p.sizes.find(function(x) { return x.label === label; });
    document.getElementById('price-' + pid).textContent = '฿' + (s ? s.price : 0).toLocaleString();
}

function changeQty(pid, delta) {
    quantities[pid] = Math.max(1, (quantities[pid] || 1) + delta);
    var el = document.getElementById('qty-' + pid);
    if (el) el.textContent = quantities[pid];
}

function getSize(pid) {
    var p = products.find(function(x) { return x.id === pid; });
    return selectedSizes[pid] || (p && p.sizes[0] ? p.sizes[0].label : '');
}
function getQty(pid) { return quantities[pid] || 1; }

/* ===== CART ===== */
function addToCart(pid) {
    var p = products.find(function(x) { return x.id === pid; });
    var size = getSize(pid);
    var qty = getQty(pid);
    var s = p.sizes.find(function(x) { return x.label === size; });
    var price = s ? s.price : 0;
    var existing = cart.find(function(i) { return i.pid === pid && i.size === size; });
    if (existing) existing.qty += qty;
    else cart.push({ pid: pid, name: p.name, size: size, qty: qty, price: price });
    updateCartBadge();
    showToast('เพิ่มลงตะกร้าแล้ว ✓');
}
function orderNow(pid) { addToCart(pid); openCart(); }
function updateCartBadge() {
    document.getElementById('cartBadge').textContent = cart.reduce(function(s,i) { return s+i.qty; }, 0);
}
function openCart() { renderCartItems(); document.getElementById('cartModal').classList.add('open'); }
function closeCart() { document.getElementById('cartModal').classList.remove('open'); }
function renderCartItems() {
    var el = document.getElementById('cartItemsEl');
    if (!cart.length) {
        el.innerHTML = '<div class="cart-empty">ตะกร้าสินค้าว่างเปล่า</div>';
        document.getElementById('cartTotalEl').textContent = '฿0';
        return;
    }
    var total = 0; el.innerHTML = '';
    cart.forEach(function(item, idx) {
        var sub = item.price * item.qty; total += sub;
        var row = document.createElement('div'); row.className = 'cart-item';
        row.innerHTML =
            '<div class="cart-item-info"><div class="cart-item-name">' + item.name + '</div>' +
            '<div class="cart-item-sub">' + item.size + ' × ' + item.qty + ' ชิ้น</div></div>' +
            '<div class="cart-item-price">฿' + sub.toLocaleString() + '</div>' +
            '<button class="cart-item-remove" onclick="removeCartItem(' + idx + ')">✕</button>';
        el.appendChild(row);
    });
    document.getElementById('cartTotalEl').textContent = '฿' + total.toLocaleString();
}
function removeCartItem(idx) { cart.splice(idx,1); updateCartBadge(); renderCartItems(); showToast('ยกเลิกรายการแล้ว'); }
function checkout() {
    if (!cart.length) { showToast('กรุณาเพิ่มสินค้าก่อน'); return; }
    var total = cart.reduce(function(s,i) { return s+i.price*i.qty; }, 0);
    showToast('ส่งคำสั่งซื้อแล้ว! รหัส: ' + customerId);
    console.log('[ORDER]', { customerId: customerId, items: cart, total: total, time: new Date().toISOString() });
    cart = []; updateCartBadge(); closeCart();
}

/* ===== SEARCH ===== */
function searchProducts(kw) {
    var lc = kw.toLowerCase();
    document.querySelectorAll('.card').forEach(function(card) {
        card.style.display = card.textContent.toLowerCase().includes(lc) ? '' : 'none';
    });
}

/* ===== ADMIN AUTH ===== */
function openAdminAuth() {
    document.getElementById('adminPwInput').value = '';
    document.getElementById('adminAuthModal').classList.add('open');
    setTimeout(function() { document.getElementById('adminPwInput').focus(); }, 150);
}
function closeAdminAuth() { document.getElementById('adminAuthModal').classList.remove('open'); }
function verifyAdmin() {
    if (document.getElementById('adminPwInput').value === ADMIN_PASSWORD) {
        closeAdminAuth(); openAdmin();
    } else {
        showToast('รหัสผ่านไม่ถูกต้อง');
        document.getElementById('adminPwInput').value = '';
        document.getElementById('adminPwInput').focus();
    }
}

/* ===== ADMIN PANEL ===== */
function openAdmin() {
    renderColorSwatches();
    renderAdminCategories();
    document.getElementById('adminModal').classList.add('open');
}
function closeAdmin() { document.getElementById('adminModal').classList.remove('open'); }

function renderColorSwatches() {
    var el = document.getElementById('colorSwatches'); el.innerHTML = '';
    themeColors.forEach(function(color) {
        var s = document.createElement('div');
        s.className = 'color-swatch' + (color === currentTheme ? ' active' : '');
        s.style.background = color; s.title = color;
        s.onclick = function() {
            currentTheme = color; applyTheme(color);
            el.querySelectorAll('.color-swatch').forEach(function(x) { x.classList.remove('active'); });
            s.classList.add('active');
        };
        el.appendChild(s);
    });
}

function renderAdminCategories() {
    var el = document.getElementById('adminCategoryList'); el.innerHTML = '';
    categories.forEach(function(cat) {
        var catProds = products.filter(function(p) { return p.catId === cat.id; });
        var block = document.createElement('div');
        block.className = 'admin-cat-block'; block.id = 'admin-block-' + cat.id;
        block.innerHTML =
            '<div class="admin-cat-header" onclick="toggleAdminCat(\'' + cat.id + '\')">' +
                '<span><span id="catname-' + cat.id + '">' + esc(cat.name) + '</span> <span style="font-size:12px;color:#bbb;font-weight:normal;" id="cnt-' + cat.id + '">(' + catProds.length + ' สินค้า)</span></span>' +
                '<span class="admin-cat-arrow open" id="arrow-' + cat.id + '">▼</span>' +
            '</div>' +
            '<div class="admin-cat-body open" id="admin-cat-' + cat.id + '">' +
                '<div class="admin-field-row" style="margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #eee;">' +
                    '<span class="admin-field-label">ชื่อหมวดหมู่</span>' +
                    '<input class="admin-input" type="text" value="' + esc(cat.name) + '" placeholder="ชื่อหมวดหมู่" oninput="updateCatName(\'' + cat.id + '\',this.value)">' +
                '</div>' +
                '<div id="admin-prods-' + cat.id + '"></div>' +
                '<button class="admin-add-prod-btn" onclick="addProduct(\'' + cat.id + '\')">＋ เพิ่มสินค้าในหมวดนี้</button>' +
            '</div>';
        el.appendChild(block);
        var prodsEl = document.getElementById('admin-prods-' + cat.id);
        catProds.forEach(function(p) { prodsEl.appendChild(buildAdminCard(p)); });
    });
}

function toggleAdminCat(catId) {
    document.getElementById('admin-cat-' + catId).classList.toggle('open');
    document.getElementById('arrow-' + catId).classList.toggle('open');
}

function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildAdminCard(p) {
    var card = document.createElement('div');
    card.className = 'admin-prod-card'; card.id = 'admin-prod-' + p.id;

    var sizesHtml = p.sizes.map(function(s, idx) {
        return '<div class="admin-size-row">' +
            '<input class="admin-size-input" type="text" value="' + esc(s.label) + '" placeholder="ขนาด" onchange="updateSizeLabel(\'' + p.id + '\',' + idx + ',this.value)">' +
            '<input class="admin-size-input" type="number" value="' + s.price + '" placeholder="ราคา" onchange="updateSizePrice(\'' + p.id + '\',' + idx + ',this.value)">' +
            '<button class="admin-size-del" onclick="removeSize(\'' + p.id + '\',' + idx + ')" title="ลบขนาดนี้">✕</button>' +
        '</div>';
    }).join('');

    var hasImg = !!p.image;
    var imgSrc = hasImg ? esc(p.image) : '';
    var urlVal = (p.image && !p.image.startsWith('data:')) ? esc(p.image) : '';

    card.innerHTML =
        '<div class="admin-prod-top">' +
            '<input class="admin-prod-name-input" type="text" value="' + esc(p.name) + '" placeholder="ชื่อสินค้า" onchange="updateField(\'' + p.id + '\',\'name\',this.value)">' +
            '<button class="admin-delete-btn" onclick="deleteProduct(\'' + p.id + '\')">ลบ</button>' +
        '</div>' +
        '<div class="admin-field-row">' +
            '<span class="admin-field-label">รายละเอียด</span>' +
            '<input class="admin-input" type="text" value="' + esc(p.detail) + '" placeholder="รายละเอียดสินค้า" onchange="updateField(\'' + p.id + '\',\'detail\',this.value)">' +
        '</div>' +
        '<div class="admin-field-row">' +
            '<span class="admin-field-label">รูปภาพ</span>' +
            '<div class="admin-img-section">' +
                '<img class="admin-img-preview" id="imgprev-' + p.id + '" src="' + imgSrc + '" style="display:' + (hasImg ? '' : 'none') + '">' +
                '<div class="admin-img-placeholder" id="imgno-' + p.id + '" style="display:' + (hasImg ? 'none' : 'flex') + '">📦</div>' +
                '<div class="admin-img-controls">' +
                    '<label class="admin-upload-label">📷 เลือกรูปจากมือถือ<input type="file" accept="image/*" onchange="handleImgUpload(this,\'' + p.id + '\')"></label>' +
                    '<input class="admin-input" type="text" value="' + urlVal + '" placeholder="หรือวาง URL รูปภาพ" style="font-size:12px;" onchange="updateImgUrl(\'' + p.id + '\',this.value)">' +
                '</div>' +
            '</div>' +
        '</div>' +
        '<div class="admin-field-row">' +
            '<span class="admin-field-label">ขนาด &amp; ราคา</span>' +
            '<div class="admin-sizes-head"><span>ขนาด</span><span>ราคา (฿)</span><span></span></div>' +
            '<div id="sizes-' + p.id + '">' + sizesHtml + '</div>' +
            '<button class="admin-add-size-btn" onclick="addSize(\'' + p.id + '\')">＋ เพิ่มขนาด</button>' +
        '</div>' +
        '<div class="admin-prod-bottom">' +
            '<button class="admin-stock-btn ' + (p.inStock ? 'instock' : 'outstock') + '" id="stockbtn-' + p.id + '" onclick="toggleStock(\'' + p.id + '\')">' +
                (p.inStock ? '✓ มีสินค้า' : '✗ สินค้าหมด') +
            '</button>' +
        '</div>';
    return card;
}

/* FIELD UPDATES */
function updateField(pid, field, value) {
    var p = products.find(function(x) { return x.id === pid; });
    if (p) p[field] = value;
}
function updateImgUrl(pid, url) {
    var p = products.find(function(x) { return x.id === pid; });
    if (!p) return;
    p.image = url.trim();
    var prev = document.getElementById('imgprev-' + pid);
    var noImg = document.getElementById('imgno-' + pid);
    if (url.trim()) {
        prev.src = url.trim(); prev.style.display = ''; noImg.style.display = 'none';
    } else {
        prev.src = ''; prev.style.display = 'none'; noImg.style.display = 'flex';
    }
}
function handleImgUpload(input, pid) {
    var file = input.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        var p = products.find(function(x) { return x.id === pid; });
        if (p) p.image = e.target.result;
        var prev = document.getElementById('imgprev-' + pid);
        var noImg = document.getElementById('imgno-' + pid);
        prev.src = e.target.result; prev.style.display = ''; noImg.style.display = 'none';
        var urlInput = document.querySelector('#admin-prod-' + pid + ' input[placeholder*="URL"]');
        if (urlInput) urlInput.value = '';
        showToast('โหลดรูปสำเร็จ ✓');
    };
    reader.readAsDataURL(file);
}

/* SIZES */
function updateSizeLabel(pid, idx, val) {
    var p = products.find(function(x) { return x.id === pid; });
    if (p && p.sizes[idx]) p.sizes[idx].label = val;
}
function updateSizePrice(pid, idx, val) {
    var p = products.find(function(x) { return x.id === pid; });
    if (p && p.sizes[idx]) p.sizes[idx].price = parseInt(val) || 0;
}
function removeSize(pid, idx) {
    var p = products.find(function(x) { return x.id === pid; });
    if (!p) return;
    p.sizes.splice(idx, 1);
    refreshSizes(p);
}
function addSize(pid) {
    var p = products.find(function(x) { return x.id === pid; });
    if (!p) return;
    p.sizes.push({ label: '', price: 0 });
    refreshSizes(p);
}
function refreshSizes(p) {
    var el = document.getElementById('sizes-' + p.id); if (!el) return;
    el.innerHTML = p.sizes.map(function(s, idx) {
        return '<div class="admin-size-row">' +
            '<input class="admin-size-input" type="text" value="' + esc(s.label) + '" placeholder="ขนาด" onchange="updateSizeLabel(\'' + p.id + '\',' + idx + ',this.value)">' +
            '<input class="admin-size-input" type="number" value="' + s.price + '" placeholder="ราคา" onchange="updateSizePrice(\'' + p.id + '\',' + idx + ',this.value)">' +
            '<button class="admin-size-del" onclick="removeSize(\'' + p.id + '\',' + idx + ')" title="ลบ">✕</button>' +
        '</div>';
    }).join('');
}

/* STOCK */
function toggleStock(pid) {
    var p = products.find(function(x) { return x.id === pid; }); if (!p) return;
    p.inStock = !p.inStock;
    var btn = document.getElementById('stockbtn-' + pid); if (!btn) return;
    btn.className = 'admin-stock-btn ' + (p.inStock ? 'instock' : 'outstock');
    btn.textContent = p.inStock ? '✓ มีสินค้า' : '✗ สินค้าหมด';
}

/* ADD / DELETE */
function addProduct(catId) {
    var newId = 'p' + Date.now();
    var prod = { id: newId, catId: catId, name: 'สินค้าใหม่', detail: '', sizes: [{ label: '10kg', price: 0 }], inStock: true, image: '' };
    products.push(prod);
    var prodsEl = document.getElementById('admin-prods-' + catId);
    if (prodsEl) prodsEl.appendChild(buildAdminCard(prod));
    updateCatCount(catId);
    showToast('เพิ่มสินค้าแล้ว');
    var newCard = document.getElementById('admin-prod-' + newId);
    if (newCard) newCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function deleteProduct(pid) {
    if (!confirm('ต้องการลบสินค้านี้?')) return;
    var p = products.find(function(x) { return x.id === pid; });
    var catId = p ? p.catId : null;
    products = products.filter(function(x) { return x.id !== pid; });
    var card = document.getElementById('admin-prod-' + pid); if (card) card.remove();
    if (catId) updateCatCount(catId);
    showToast('ลบสินค้าแล้ว');
}
function updateCatCount(catId) {
    var el = document.getElementById('cnt-' + catId); if (!el) return;
    el.textContent = '(' + products.filter(function(p) { return p.catId === catId; }).length + ' สินค้า)';
}
function updateCatName(catId, name) {
    var cat = categories.find(function(c) { return c.id === catId; });
    if (cat) cat.name = name;
    var span = document.getElementById('catname-' + catId);
    if (span) span.textContent = name;
}

/* SAVE */
function saveAdmin() { renderCatalog(); renderNav(); closeAdmin(); showToast('บันทึกสำเร็จ ✓'); }

/* HELPERS */
function overlayClose(e, id, fn) { if (e.target === document.getElementById(id)) fn(); }
function showToast(msg) {
    var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(t._timer); t._timer = setTimeout(function() { t.classList.remove('show'); }, 2200);
}

init();
</script>
